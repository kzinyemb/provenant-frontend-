<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6B0NP15RYC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6B0NP15RYC');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Provenant™ Creators</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap">
    
    <style>
        :root {
            --brand-creator: #e11d48; /* Vibrant Rose branding element alignment */
            --brand-dark: #0f172a;    /* Deep Slate */
            --brand-surface: #1e293b; /* Medium Slate */
            --brand-glass: rgba(255, 255, 255, 0.03);
            --brand-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand-accent: #00b894;  /* Success Green */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #310413 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .checkout-container {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            width: 100%;
            max-width: 1000px;
            background: var(--brand-glass);
            border: 1px solid var(--brand-border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .payment-form {
            padding: 60px;
            background: #111827;
        }

        .payment-form h2 { 
            margin-bottom: 30px; 
            font-size: 1.8rem; 
            font-weight: 900; 
            letter-spacing: -1px;
        }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 800; 
        }
        
        input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--brand-border);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus { border-color: var(--brand-creator); }

        .secure-btn {
            width: 100%;
            background: var(--brand-creator);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(225, 29, 72, 0.3);
            letter-spacing: 0.5px;
        }

        .secure-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(225, 29, 72, 0.5); 
            filter: brightness(1.1);
        }

        .order-summary {
            padding: 60px;
            background: rgba(30, 41, 59, 0.2);
            border-left: 1px solid var(--brand-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .order-summary h3 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .total { 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: var(--brand-accent); 
            margin-top: 30px; 
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 850px) {
            .checkout-container { grid-template-columns: 1fr; }
            .order-summary { order: -1; padding: 40px; border-left: none; border-bottom: 1px solid var(--brand-border); }
            .payment-form { padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="payment-form">
            <h2>Account Verification</h2>
            <form id="payment-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="creator@domain.com" required>
                </div>
                <div class="form-group">
                    <label>Full Name / Studio Entity</label>
                    <input type="text" placeholder="First and Last Name or Brand Legal Name" required>
                </div>
                
                <button type="submit" class="secure-btn">Continue to Secure Setup</button>
                
                <p style="text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 20px;">
                    🔒 Secured by Stripe. You will not be billed during your 30-day forensic trial pipeline.
                </p>
            </form>
        </div>

        <div class="order-summary">
            <div>
                <h3>Order Summary</h3>
                <p style="color: var(--text-muted); font-size: 13px;">Review your verification portal selection</p>
                
                <div class="summary-item">
                    <div>
                        <div id="summary-plan-name" style="font-weight: 800; color: #fff; min-height: 20px;"></div>
                        <div id="summary-billing-interval" style="font-size: 12px; color: var(--text-muted); margin-top: 4px; min-height: 18px;"></div>
                    </div>
                    <div id="summary-base-price" style="font-weight: 700;"></div>
                </div>

                <div class="summary-item">
                    <div style="color: var(--text-muted);">30-Day Trial Credit</div>
                    <div id="summary-discount-price" style="color: var(--brand-accent); font-weight: 700;"></div>
                </div>
            </div>

            <div>
                <div class="total">
                    <span style="font-size: 13px; color: white; font-weight: bold; text-transform: uppercase; tracking-wider; margin-right: 4px;">Due Today:</span> $0.00
                </div>

                <div style="margin-top: 30px; font-size: 11px; color: var(--text-muted); line-height: 1.6;">
                    <p id="billing-timeline-disclosure"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Updated with your new active production test link string
        const stripePaymentLinks = {
            "Creator Studio Pro Suite": "https://buy.stripe.com/test_dRm7sM17wa9wcil8h3bo408" 
        };

        let activePlanName = "Creator Studio Pro Suite";

        window.onload = function() {
            let planPrice = "$29.00";
            let intervalLabel = "Speech Recognition Transcription & Sound Provenance Module";
            let structuralInterval = "/mo";

            document.getElementById('summary-plan-name').innerText = activePlanName;
            document.getElementById('summary-billing-interval').innerText = intervalLabel;
            document.getElementById('summary-base-price').innerText = planPrice;
            document.getElementById('summary-discount-price').innerText = "- " + planPrice;
            
            const targetTrialExpiration = new Date();
            targetTrialExpiration.setDate(targetTrialExpiration.getDate() + 30);
            const genericFormattedDate = targetTrialExpiration.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            document.getElementById('billing-timeline-disclosure').innerHTML = `After your 30-day forensic sandbox trial ends on <b>${genericFormattedDate}</b>, your verified payment vehicle will automatically clear a standard platform renewal step of <b>${planPrice}${structuralInterval}</b> unless paused via billing dashboards.`;
        };

        document.getElementById('payment-form').onsubmit = function(e) {
            e.preventDefault();
            const targetCheckoutUrl = stripePaymentLinks[activePlanName];
            
            if (!targetCheckoutUrl) {
                alert("Configuration update required: Missing link array pairing parameters.");
                return;
            }

            window.location.href = targetCheckoutUrl;
        };
    </script>
</body>
</html>
