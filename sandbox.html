<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writers Forensic Workspace | VerifyHuman™</title>
    <!-- React & Tailwind Setup -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --brand-dark: #1a1a1a; --ribbon-bg: #ffffff; --border-color: #edebe9; --bg-workspace: #f4f7f6; }
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: var(--bg-workspace); font-family: 'Inter', sans-serif; margin: 0; }
        .quick-access { background: var(--brand-dark); color: white; padding: 8px 20px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        .tabs { background: var(--brand-dark); display: flex; padding-left: 10px; z-index: 50; }
        .tab { padding: 10px 20px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: var(--ribbon-bg); color: var(--brand-dark); border-radius: 8px 8px 0 0; }
        .ribbon-content { background: var(--ribbon-bg); height: 115px; border-bottom: 1px solid var(--border-color); display: none; padding: 0 20px; align-items: center; gap: 10px; }
        .ribbon-content.active { display: flex; }
        .group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border-color); padding: 0 15px; height: 85%; justify-content: center; }
        .group-label { font-size: 10px; color: #888; margin-top: 5px; text-transform: uppercase; }
        .btn-row { display: flex; gap: 4px; }
        .btn-ribbon { background: none; border: 1px solid transparent; padding: 6px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .btn-ribbon:hover { background: #f0f0f0; }
        .btn-big { flex-direction: column; display: flex; min-width: 55px; text-align: center; }
        .workspace-container { display: flex; flex-grow: 1; overflow: hidden; }
        .workspace { flex-grow: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .paper { background: white; width: 8.5in; min-height: 11in; padding: 1in; box-shadow: 0 0 10px rgba(0,0,0,0.1); outline: none; }
        #provenant-sidebar { width: 350px; border-left: 1px solid #ddd; background: #000; color: #eee; overflow-y: auto; }
    </style>
</head>
<body>

<div class="quick-access">
    <div onclick="location.href='index.html'" style="cursor:pointer">🏠</div>
    <div onclick="manualSave()" id="save-icon" style="cursor:pointer">💾</div>
    <span id="doc-name" style="margin-left:auto; font-weight:bold; font-size:12px;" onclick="renameDoc()">Untitled Manuscript</span>
</div>

<div class="tabs">
    <div class="tab" onclick="setView('file')">File</div>
    <div class="tab active" id="tab-home" onclick="setView('home')">Home</div>
    <div class="tab" id="tab-data" onclick="setView('data')" style="background:#00b894; color:white">Forensics</div>
</div>

<!-- Ribbons (Kept Original) -->
<div class="ribbon-content" id="file-ribbon">...</div>
<div class="ribbon-content active" id="home-ribbon">...</div>

<div class="workspace-container">
    <div class="workspace">
        <div id="word-view" class="paper" contenteditable="true">Start composing...</div>
    </div>
    
    <!-- React Integrated Sidebar -->
    <div id="provenant-sidebar"></div>
</div>

<script type="text/babel">
    const { useState, useRef } = React;
    const { Mic, Clock, Play, Square, QrCode } = lucide;

    function ProvenantSidebar() {
        const [isRecording, setIsRecording] = useState(false);
        const [sessionLog, setSessionLog] = useState([]);
        const [audioUrl, setAudioUrl] = useState(null);
        const mediaRecorderRef = useRef(null);
        const audioChunksRef = useRef([]);

        const startRecording = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorderRef.current = new MediaRecorder(stream);
            audioChunksRef.current = [];
            mediaRecorderRef.current.ondataavailable = (e) => audioChunksRef.current.push(e.data);
            mediaRecorderRef.current.onstop = () => {
                const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                setAudioUrl(URL.createObjectURL(audioBlob));
                setSessionLog(prev => [...prev, { timestamp: new Date().toLocaleTimeString(), event: "Segment Finalized" }]);
            };
            mediaRecorderRef.current.start();
            setIsRecording(true);
        };

        return (
            <div className="p-6 font-sans">
                <h1 className="text-xl font-bold text-blue-400 mb-6">Provenant Studio</h1>
                <div className="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-4">
                    <h2 className="flex items-center gap-2 mb-4 text-sm"><Mic size={16} /> Capture</h2>
                    <div className="flex gap-2 items-center">
                        <button onClick={() => isRecording ? mediaRecorderRef.current.stop() || setIsRecording(false) : startRecording()} 
                                className={`px-4 py-2 rounded ${isRecording ? 'bg-red-600' : 'bg-blue-600'}`}>
                            {isRecording ? <Square size={16}/> : <Play size={16}/>}
                        </button>
                        {audioUrl && <audio src={audioUrl} controls className="h-8 w-full" />}
                    </div>
                </div>
                <div className="bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    <h2 className="flex items-center gap-2 mb-4 text-sm"><Clock size={16} /> Log</h2>
                    <div className="text-[10px] h-32 overflow-y-auto space-y-1">
                        {sessionLog.map((log, i) => <div key={i}>[{log.timestamp}] {log.event}</div>)}
                    </div>
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('provenant-sidebar'));
    root.render(<ProvenantSidebar />);
</script>

<script>
    // Existing helper scripts (manualSave, setView, etc.)
    function setView(id) { /* Existing implementation */ }
</script>
</body>
</html>
